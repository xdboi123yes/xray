# Pre-commit configuration for chest X-ray refactored project

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-comment-language
        name: Check code comments and string literals are English-only
        entry: python scripts/check_comment_language.py
        language: python
        types_or: [python, ts, tsx]

      - id: mypy-check
        name: Mypy Static Type Analysis
        entry: mypy core/ application/ infrastructure/
        language: python
        additional_dependencies: [
          "mypy==1.10.0",
          "pydantic==2.6.4",
          "pydantic-settings==2.2.1",
          "types-PyYAML==6.0.12.12"
        ]
        pass_filenames: false
        always_run: true

      - id: import-linter
        name: Import Linter Boundaries
        entry: lint-imports
        language: python
        additional_dependencies: ["import-linter==2.0"]
        pass_filenames: false
        always_run: true

      - id: i18n-parity
        name: i18n EN/TR Key Parity Check
        entry: python scripts/check_i18n_parity.py
        language: python
        pass_filenames: false
        always_run: true

      - id: pytest-unit
        name: Pytest Unit Tests
        entry: pytest tests/unit -x --no-header -q
        language: python
        additional_dependencies: [
          "pytest==8.4.2",
          "pytest-asyncio==0.23.8",
          "pytest-cov==4.1.0",
          "numpy==1.26.4",
          "torch==2.2.2",
          "torchvision==0.17.2",
          "timm==0.9.16",
          "albumentations==1.4.3",
          "pydantic==2.6.4",
          "pydantic-settings==2.2.1",
          "pyyaml==6.0.1",
          "structlog==24.1.0",
          "slowapi==0.1.9",
          "fastapi==0.110.0",
          "tqdm==4.66.2",
          "mlflow==2.11.3",
          "nonconformist==2.1.0",
          "scikit-learn==1.4.1.post1",
          "pydicom==2.4.4",
          "pytorch-grad-cam==1.5.0",
          "httpx==0.27.0"
        ]
        pass_filenames: false
        always_run: true
