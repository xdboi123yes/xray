# ============================================================
# Chest X-Ray Tiered Classification System
# Nginx Custom Configuration for React SPA + FastAPI API/WS Reverse Proxy
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Static assets directory
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API requests to the backend service "api"
    location /api {
        proxy_pass http://api:8000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket predict requests to the backend service "api"
    location /api/v1/ws {
        proxy_pass http://api:8000/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Custom error page fallback
    error_page 500 502 503 504 /55x.html;
    location = /55x.html {
        root /usr/share/nginx/html;
    }
}
