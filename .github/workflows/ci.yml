name: CI Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: |
          ruff check core/ application/ infrastructure/ web/ tests/

      - name: Mypy static check
        run: |
          mypy core/ application/ infrastructure/

      - name: Import boundary check
        run: |
          lint-imports

      - name: Code comments and string literals language check
        run: |
          python scripts/check_comment_language.py

      - name: i18n EN/TR key parity check
        run: |
          python scripts/check_i18n_parity.py

      - name: Run unit and integration tests with coverage
        run: |
          pytest tests/ -v --cov=core --cov=application --cov-fail-under=70

      - name: Verify no raw print statements leak to production layers
        run: |
          ! grep -rn "^\s*print(" core/ application/ infrastructure/ web/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd web/frontend
          npm ci

      - name: Build frontend
        run: |
          cd web/frontend
          npm run build
